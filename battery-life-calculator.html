<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低功耗设备电池寿命计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 6px;
            font-size: 2em;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            color: #00d9ff;
            font-size: 1.05em;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 217, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 基础参数网格 */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-row-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .input-row, .input-row-4 {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 420px) {
            .input-row, .input-row-4 {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: #ccd6f6;
            font-size: 0.88em;
        }

        input, select {
            padding: 11px 14px;
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95em;
            transition: all 0.3s ease;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.25);
        }

        input::placeholder {
            color: #4a5a7a;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        /* 工作状态区域 */
        .states-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .states-hint {
            color: #8892b0;
            font-size: 0.85em;
        }

        .btn-add {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.4);
            color: #00d9ff;
            padding: 7px 18px;
            border-radius: 30px;
            font-size: 0.88em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-add:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        /* 状态行 */
        .state-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 217, 255, 0.12);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .state-row:hover {
            border-color: rgba(0, 217, 255, 0.3);
        }

        .state-index {
            color: #00d9ff;
            font-size: 0.8em;
            font-weight: 700;
            min-width: 22px;
            text-align: center;
            opacity: 0.7;
        }

        .state-fields {
            display: flex;
            flex: 1;
            gap: 10px;
            flex-wrap: wrap;
        }

        .state-field {
            flex: 1 1 110px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .state-field label {
            font-size: 0.72em;
            color: #6a7a9a;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .state-field input {
            padding: 8px 10px;
            font-size: 0.9em;
            border-radius: 8px;
        }

        .state-field.desc-field {
            flex: 2 1 160px;
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 100, 100, 0.3);
            background: rgba(255, 80, 80, 0.08);
            color: #ff8080;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: rgba(255, 80, 80, 0.2);
            border-color: rgba(255, 80, 80, 0.6);
            color: #ff5555;
        }

        .delete-btn:disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* 计算按钮 */
        .btn-calculate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .btn-calculate:active {
            transform: translateY(0);
        }

        /* 错误提示 */
        .error-msg {
            background: rgba(255, 80, 80, 0.12);
            border: 1px solid rgba(255, 80, 80, 0.4);
            color: #ff9090;
            border-radius: 10px;
            padding: 10px 16px;
            margin-top: 14px;
            font-size: 0.9em;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* 结果区域 */
        .result {
            margin-top: 30px;
            padding: 26px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.07) 0%, rgba(0, 153, 204, 0.07) 100%);
            border-radius: 18px;
            border: 1px solid rgba(0, 217, 255, 0.25);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            color: #00d9ff;
            font-size: 1.15em;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 寿命大数字 */
        .life-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .life-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 16px;
            padding: 16px 28px;
            text-align: center;
            min-width: 130px;
        }

        .life-badge .val {
            font-size: 2.2em;
            font-weight: 700;
            color: #00ff88;
            line-height: 1.1;
        }

        .life-badge .unit {
            font-size: 0.85em;
            color: #8892b0;
            margin-top: 4px;
        }

        /* 详细数据网格 */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .result-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }

        .result-label {
            color: #8892b0;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .result-value {
            color: #00d9ff;
            font-size: 1.25em;
            font-weight: 700;
        }

        .result-unit {
            color: #6a7a9a;
            font-size: 0.78em;
            margin-left: 2px;
        }

        /* 电池可视化 */
        .battery-visual {
            text-align: center;
            margin-bottom: 20px;
        }

        .battery-wrap {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .battery-body {
            width: 200px;
            height: 72px;
            border: 3px solid #00d9ff;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            position: relative;
        }

        .battery-fill {
            height: 100%;
            transition: width 1s ease, background 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1em;
            color: #000;
        }

        .battery-cap {
            width: 8px;
            height: 28px;
            background: #00d9ff;
            border-radius: 0 4px 4px 0;
        }

        /* 公式展示 */
        .formula-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.82em;
            color: #a0b4c8;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .formula-box .f-title {
            color: #00d9ff;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95em;
        }

        /* 建议提示 */
        .tips-box {
            background: rgba(255, 200, 0, 0.08);
            border-left: 3px solid #ffc107;
            border-radius: 0 10px 10px 0;
            padding: 12px 16px;
            font-size: 0.88em;
            color: #ffd060;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔋 低功耗设备电池寿命计算器</h1>
    <p class="subtitle">多状态加权平均模型 · 适用于 IoT 传感器、无线测温等低功耗设备</p>

    <div class="calculator">

        <!-- 电池基础参数 -->
        <div class="section-title">⚙️ 电池参数</div>
        <div class="input-row-4">
            <div class="input-group">
                <label>标称容量 (mAh)</label>
                <input type="number" id="capacity" step="0.1" min="0" value="4000" placeholder="例: 4000">
            </div>
            <div class="input-group">
                <label>标称电压 (V)</label>
                <input type="number" id="voltage" step="0.1" min="0" value="3.6" placeholder="例: 3.6">
            </div>
            <div class="input-group">
                <label>利用系数 (0~1)</label>
                <input type="number" id="utilFactor" step="0.01" min="0" max="1" value="0.9" placeholder="0.8~1.0">
            </div>
            <div class="input-group">
                <label>年自放电率 (%)</label>
                <input type="number" id="selfDischarge" step="0.1" min="0" value="2" placeholder="通常 1~5%">
            </div>
        </div>

        <!-- 工作状态 -->
        <div class="section-title" style="margin-top: 10px;">📈 工作状态（一个完整周期内）</div>
        <div class="states-header">
            <span class="states-hint">填写每个工作状态的电流和持续时间，计算器自动加权平均</span>
            <button class="btn-add" id="addStateBtn" type="button">➕ 添加状态</button>
        </div>

        <div id="statesContainer"></div>

        <!-- 计算按钮 -->
        <button class="btn-calculate" id="calcBtn">⚡ 计算电池使用寿命</button>

        <!-- 错误提示 -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- 结果区域 -->
        <div class="result" id="result">
            <div class="result-title">📊 预估结果</div>

            <!-- 寿命大数字 -->
            <div class="life-badges">
                <div class="life-badge">
                    <div class="val" id="resLifeH">—</div>
                    <div class="unit">小时</div>
                </div>
                <div class="life-badge">
                    <div class="val" id="resLifeD">—</div>
                    <div class="unit">天</div>
                </div>
                <div class="life-badge">
                    <div class="val" id="resLifeY">—</div>
                    <div class="unit">年</div>
                </div>
            </div>

            <!-- 电池可视化 -->
            <div class="battery-visual">
                <div class="battery-wrap">
                    <div class="battery-body">
                        <div class="battery-fill" id="batteryFill" style="width:0%"></div>
                    </div>
                    <div class="battery-cap"></div>
                </div>
            </div>

            <!-- 详细数据 -->
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">加权平均电流</div>
                    <div><span class="result-value" id="resIAvg">—</span><span class="result-unit">mA</span></div>
                </div>
                <div class="result-item">
                    <div class="result-label">自放电等效电流</div>
                    <div><span class="result-value" id="resISelf">—</span><span class="result-unit">mA</span></div>
                </div>
                <div class="result-item">
                    <div class="result-label">总平均电流</div>
                    <div><span class="result-value" id="resITotal">—</span><span class="result-unit">mA</span></div>
                </div>
                <div class="result-item">
                    <div class="result-label">有效容量</div>
                    <div><span class="result-value" id="resCEff">—</span><span class="result-unit">mAh</span></div>
                </div>
                <div class="result-item">
                    <div class="result-label">周期时长</div>
                    <div><span class="result-value" id="resPeriod">—</span><span class="result-unit">秒</span></div>
                </div>
                <div class="result-item">
                    <div class="result-label">每日耗电</div>
                    <div><span class="result-value" id="resDaily">—</span><span class="result-unit">mAh</span></div>
                </div>
            </div>

            <!-- 公式 -->
            <div class="formula-box">
                <span class="f-title">📐 计算过程</span>
                <span id="formulaText"></span>
            </div>

            <!-- 建议 -->
            <div class="tips-box" id="tipsBox"></div>
        </div>

    </div>
</div>

<script>
(function () {
    const container = document.getElementById('statesContainer');
    const addBtn = document.getElementById('addStateBtn');
    const calcBtn = document.getElementById('calcBtn');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('errorMsg');

    // 创建状态行
    function createStateRow(currentVal, timeVal, descVal, index) {
        const row = document.createElement('div');
        row.className = 'state-row';

        // 序号
        const idx = document.createElement('div');
        idx.className = 'state-index';
        idx.textContent = '#' + (index || 1);
        row.appendChild(idx);

        // 字段区
        const fields = document.createElement('div');
        fields.className = 'state-fields';

        // 电流
        const fCurrent = document.createElement('div');
        fCurrent.className = 'state-field';
        fCurrent.innerHTML = '<label>电流 (mA)</label>';
        const iInput = document.createElement('input');
        iInput.type = 'number'; iInput.step = '0.001'; iInput.min = '0';
        iInput.placeholder = '例: 50';
        iInput.value = currentVal !== undefined ? currentVal : '';
        fCurrent.appendChild(iInput);

        // 时间
        const fTime = document.createElement('div');
        fTime.className = 'state-field';
        fTime.innerHTML = '<label>持续时间 (秒)</label>';
        const tInput = document.createElement('input');
        tInput.type = 'number'; tInput.step = '0.1'; tInput.min = '0';
        tInput.placeholder = '例: 2';
        tInput.value = timeVal !== undefined ? timeVal : '';
        fTime.appendChild(tInput);

        // 描述
        const fDesc = document.createElement('div');
        fDesc.className = 'state-field desc-field';
        fDesc.innerHTML = '<label>状态描述（可选）</label>';
        const dInput = document.createElement('input');
        dInput.type = 'text';
        dInput.placeholder = '如：发送数据 / 休眠';
        dInput.value = descVal || '';
        fDesc.appendChild(dInput);

        fields.appendChild(fCurrent);
        fields.appendChild(fTime);
        fields.appendChild(fDesc);
        row.appendChild(fields);

        // 删除按钮
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.type = 'button';
        delBtn.innerHTML = '✕';
        row.appendChild(delBtn);

        return row;
    }

    // 重新编号所有行
    function reindex() {
        container.querySelectorAll('.state-row').forEach((row, i) => {
            const idx = row.querySelector('.state-index');
            if (idx) idx.textContent = '#' + (i + 1);
        });
    }

    // 初始化两行示例
    function init() {
        container.innerHTML = '';
        const defaults = [
            { i: 50, t: 2, d: '发送数据' },
            { i: 0.5, t: 58, d: '休眠' },
        ];
        defaults.forEach((s, idx) => {
            container.appendChild(createStateRow(s.i, s.t, s.d, idx + 1));
        });
    }
    init();

    // 添加状态
    addBtn.addEventListener('click', function () {
        const rows = container.querySelectorAll('.state-row');
        container.appendChild(createStateRow('', '', '', rows.length + 1));
        reindex();
    });

    // 删除状态（事件委托）
    container.addEventListener('click', function (e) {
        if (e.target.classList.contains('delete-btn')) {
            const row = e.target.closest('.state-row');
            if (!row) return;
            if (container.querySelectorAll('.state-row').length <= 1) {
                showError('⚠️ 至少保留一个工作状态');
                return;
            }
            row.remove();
            reindex();
            hideError();
        }
    });

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.add('show');
        resultDiv.classList.remove('show');
    }
    function hideError() {
        errorDiv.classList.remove('show');
    }

    // 计算
    calcBtn.addEventListener('click', function () {
        hideError();

        const capacity = parseFloat(document.getElementById('capacity').value);
        const voltage = parseFloat(document.getElementById('voltage').value);
        const util = parseFloat(document.getElementById('utilFactor').value);
        const selfPerYear = parseFloat(document.getElementById('selfDischarge').value);

        if (isNaN(capacity) || capacity <= 0) return showError('⚠️ 电池容量必须为正数');
        if (isNaN(voltage) || voltage <= 0) return showError('⚠️ 电池电压必须为正数');
        if (isNaN(util) || util <= 0 || util > 1) return showError('⚠️ 利用系数需在 0~1 之间');
        if (isNaN(selfPerYear) || selfPerYear < 0) return showError('⚠️ 自放电率不能为负数');

        const rows = container.querySelectorAll('.state-row');
        if (rows.length === 0) return showError('⚠️ 请添加至少一个工作状态');

        let totalTime = 0, totalCharge = 0;
        let valid = true;

        rows.forEach((row, idx) => {
            const inputs = row.querySelectorAll('.state-field input[type=number]');
            if (inputs.length < 2) return;
            const iVal = inputs[0].value.trim();
            const tVal = inputs[1].value.trim();

            if (iVal === '' || tVal === '') {
                showError(`⚠️ 第 ${idx + 1} 行请填写完整（电流和时间）`);
                valid = false; return;
            }
            const i = parseFloat(iVal), t = parseFloat(tVal);
            if (isNaN(i) || i < 0 || isNaN(t) || t <= 0) {
                showError(`⚠️ 第 ${idx + 1} 行数值无效（电流≥0，时间>0）`);
                valid = false; return;
            }
            totalCharge += i * t;
            totalTime += t;
        });

        if (!valid) return;
        if (totalTime === 0) return showError('⚠️ 总周期时间不能为 0');

        const iAvg = totalCharge / totalTime;
        const iSelf = (capacity * (selfPerYear / 100)) / 8760;
        const iTotal = iAvg + iSelf;
        const cEff = capacity * util;

        if (iTotal <= 0) return showError('⚠️ 总平均电流为 0，请检查输入');

        const lifeH = cEff / iTotal;
        const lifeD = lifeH / 24;
        const lifeY = lifeH / 8760;
        const dailymAh = iTotal * 24;

        // 渲染数值
        document.getElementById('resLifeH').textContent = lifeH.toFixed(1);
        document.getElementById('resLifeD').textContent = lifeD.toFixed(1);
        document.getElementById('resLifeY').textContent = lifeY.toFixed(2);
        document.getElementById('resIAvg').textContent = iAvg.toFixed(4);
        document.getElementById('resISelf').textContent = iSelf.toFixed(4);
        document.getElementById('resITotal').textContent = iTotal.toFixed(4);
        document.getElementById('resCEff').textContent = cEff.toFixed(1);
        document.getElementById('resPeriod').textContent = totalTime.toFixed(1);
        document.getElementById('resDaily').textContent = dailymAh.toFixed(3);

        // 电池可视化
        const fill = document.getElementById('batteryFill');
        let pct = Math.min(100, Math.max(5, lifeY >= 5 ? 100 : lifeY >= 3 ? 80 : lifeY >= 2 ? 60 : lifeY >= 1 ? 40 : lifeY >= 0.5 ? 20 : 8));
        fill.style.width = pct + '%';
        fill.textContent = pct + '%';
        fill.style.background = pct >= 60
            ? 'linear-gradient(90deg,#00ff88,#00d9aa)'
            : pct >= 30
            ? 'linear-gradient(90deg,#ffc107,#ffdd55)'
            : 'linear-gradient(90deg,#ff5555,#ff8080)';
        fill.style.color = '#000';

        // 公式
        document.getElementById('formulaText').innerHTML =
            `I<sub>avg</sub> = Σ(I×T) / ΣT = ${totalCharge.toFixed(3)} / ${totalTime.toFixed(1)} = <b>${iAvg.toFixed(4)} mA</b><br>` +
            `I<sub>self</sub> = ${capacity} × ${selfPerYear}% / 8760 = <b>${iSelf.toFixed(4)} mA</b><br>` +
            `I<sub>total</sub> = ${iAvg.toFixed(4)} + ${iSelf.toFixed(4)} = <b>${iTotal.toFixed(4)} mA</b><br>` +
            `C<sub>eff</sub> = ${capacity} × ${util} = <b>${cEff.toFixed(1)} mAh</b><br>` +
            `寿命 = ${cEff.toFixed(1)} / ${iTotal.toFixed(4)} = <b>${lifeH.toFixed(1)} h = ${lifeD.toFixed(1)} 天 = ${lifeY.toFixed(2)} 年</b>`;

        // 建议
        let tip = '';
        if (lifeY < 0.5) tip = '⚠️ 寿命较短，建议增大电池容量，或优化工作状态降低平均电流（延长休眠时间、减少发送频率）';
        else if (lifeY < 1) tip = '💡 寿命不足一年，可考虑增大容量或进一步降低工作电流';
        else if (lifeY < 2) tip = '✅ 寿命 1~2 年，符合一般低功耗设备预期，可按需优化';
        else if (lifeY < 5) tip = '✅ 寿命 2~5 年，设计良好，适合长期部署';
        else tip = '⭐ 寿命超过 5 年，非常优秀！适合免维护长期部署场景';
        document.getElementById('tipsBox').textContent = tip;

        resultDiv.classList.add('show');
    });

    // 回车快速计算
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
            e.preventDefault();
            calcBtn.click();
        }
    });
})();
</script>
</body>
</html>
